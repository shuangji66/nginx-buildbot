name: Build Transmission and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Transmission 版本号（例如 4.1.1）'
        required: true
        type: string
      manifest_version:
        description: 'manifest 中的版本号（例如 4.1.1-1）'
        required: true
        type: string
      changelog:
        description: '更新日志（支持中文）'
        required: true
        type: string
      publish:
        description: '是否发布到 Fndepot Release'
        required: false
        type: boolean
        default: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: x86
          - os: ubuntu-22.04-arm
            platform: arm
    runs-on: ${{ matrix.os }}
    outputs:
      app_name: ${{ steps.set_vars.outputs.app_name }}
      manifest_version: ${{ steps.set_vars.outputs.manifest_version }}
      upstream_version: ${{ steps.set_vars.outputs.upstream_version }}
      changelog: ${{ steps.set_vars.outputs.changelog }}
    steps:
      - name: 设置项目变量
        id: set_vars
        run: |
          APP_NAME="Transmission"
          VERSION="${{ github.event.inputs.version }}"
          MANIFEST_VERSION="${{ github.event.inputs.manifest_version }}"
          CHANGELOG="${{ github.event.inputs.changelog }}"
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "upstream_version=$VERSION" >> $GITHUB_OUTPUT
          echo "manifest_version=$MANIFEST_VERSION" >> $GITHUB_OUTPUT
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake libssl-dev pkg-config libcurl4-openssl-dev \
            zlib1g-dev gettext wget curl jq

      - name: 下载 Transmission 源码
        run: |
          VERSION="${{ steps.set_vars.outputs.upstream_version }}"
          wget "https://github.com/transmission/transmission/releases/download/${VERSION}/transmission-${VERSION}.tar.xz"
          tar -xf "transmission-${VERSION}.tar.xz"
          mv "transmission-${VERSION}" transmission-src

      - name: 配置 CMake
        working-directory: ./transmission-src
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/var/apps/Transmission/target \
            -DENABLE_GTK=OFF \
            -DENABLE_QT=OFF \
            -DENABLE_MAC=OFF \
            -DWITH_CRYPTO=openssl \
            -DUSE_SYSTEM_EVENT2=OFF \
            -DUSE_SYSTEM_DEFLATE=OFF \
            -DUSE_SYSTEM_DHT=OFF \
            -DUSE_SYSTEM_MINIUPNPC=OFF \
            -DUSE_SYSTEM_NATPMP=OFF \
            -DUSE_SYSTEM_UTP=OFF \
            -DUSE_SYSTEM_B64=OFF \
            -DUSE_SYSTEM_PSL=OFF \
            -DRUN_CLANG_TIDY=OFF

      - name: 编译
        working-directory: ./transmission-src
        run: cmake --build build --parallel $(nproc)

      - name: 下载 TrguiNG 最新 web 包
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_INFO=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/ManuZhu0728/TrguiNG/releases/latest")
          DOWNLOAD_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | test("trguing-web-.*\\.zip")) | .browser_download_url' | head -1)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "错误：未找到 trguing-web-*.zip 文件"
            exit 1
          fi
          wget "$DOWNLOAD_URL" -O trguing-web.zip
          unzip trguing-web.zip -d trguing-web-extracted
          echo "TrguiNG 解压完成，目录结构："
          ls -la trguing-web-extracted/

      - name: 检出 buildbot 仓库
        uses: actions/checkout@v6
        with:
          path: buildbot_repo

      - name: 准备 fnpack 工具和模板
        run: |
          mkdir -p build_workspace
          cp -r "buildbot_repo/fnpack/${{ steps.set_vars.outputs.app_name }}" build_workspace/
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            FNPACK_BIN="fnpack-1.2.1-linux-amd64"
          else
            FNPACK_BIN="fnpack-1.2.1-linux-arm64"
          fi
          cp "buildbot_repo/fnpack/$FNPACK_BIN" build_workspace/fnpack
          chmod +x build_workspace/fnpack

      # ========== 项目特有的复制步骤 ==========
      - name: 复制编译产物到 app/bin
        run: |
          APP_DIR="build_workspace/${{ steps.set_vars.outputs.app_name }}/app"
          mkdir -p "$APP_DIR/bin"
          # 复制 daemon 和 utils
          cp transmission-src/build/daemon/transmission-daemon "$APP_DIR/bin/"
          cp transmission-src/build/utils/transmission* "$APP_DIR/bin/"
          chmod +x "$APP_DIR/bin"/transmission*
          echo "复制完成，app/bin 内容："
          ls -la "$APP_DIR/bin"

      - name: 复制 TrguiNG 到 app/www
        run: |
          APP_DIR="build_workspace/${{ steps.set_vars.outputs.app_name }}/app"
          mkdir -p "$APP_DIR/www"
          # 解压后的目录可能包含一层子目录（如 trguing-web-xxx），需要将其内容移到 www 根目录
          if [ $(ls -1 trguing-web-extracted | wc -l) -eq 1 ] && [ -d "trguing-web-extracted/$(ls trguing-web-extracted)" ]; then
            SUBDIR=$(ls trguing-web-extracted)
            cp -r "trguing-web-extracted/$SUBDIR"/* "$APP_DIR/www/"
          else
            cp -r trguing-web-extracted/* "$APP_DIR/www/"
          fi
          echo "复制完成，app/www 内容："
          ls -la "$APP_DIR/www"
      # =====================================

      - name: 修改 manifest 文件
        run: |
          MANIFEST_PATH="build_workspace/${{ steps.set_vars.outputs.app_name }}/manifest"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "错误：manifest 文件不存在于 $MANIFEST_PATH"
            exit 1
          fi
          MANIFEST_VERSION="${{ steps.set_vars.outputs.manifest_version }}"
          CHANGELOG="${{ steps.set_vars.outputs.changelog }}"
          sudo apt-get update && sudo apt-get install -y jq
          ESCAPED_CHANGELOG=$(printf '%s' "$CHANGELOG" | jq -sRr @json)
          sed -i "s/\${VERSION}/$MANIFEST_VERSION/g" "$MANIFEST_PATH"
          sed -i "s/\${CHANGELOG}/$ESCAPED_CHANGELOG/g" "$MANIFEST_PATH"
          sed -i "s/\${PLATFORM}/${{ matrix.platform }}/g" "$MANIFEST_PATH"
          echo "manifest 修改后的内容："
          cat "$MANIFEST_PATH"

      - name: 执行 fnpack 打包
        run: |
          cd build_workspace
          ./fnpack build "${{ steps.set_vars.outputs.app_name }}"
          FPK_FILE=$(ls *.fpk | head -n 1)
          if [ -z "$FPK_FILE" ]; then
            echo "错误：未找到生成的 fpk 文件"
            exit 1
          fi
          FINAL_NAME="${{ steps.set_vars.outputs.app_name }}-${{ steps.set_vars.outputs.manifest_version }}-${{ matrix.platform }}.fpk"
          mv "$FPK_FILE" "$FINAL_NAME"
          echo "FINAL_FPK=$FINAL_NAME" >> $GITHUB_ENV
          echo "打包完成，生成文件：$FINAL_NAME"
          ls -la *.fpk

      - name: 上传 fpk 文件作为 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: fpk-${{ matrix.platform }}
          path: build_workspace/*.fpk
          if-no-files-found: error

  publish:
    name: 发布到 Fndepot Release
    needs: build
    if: always() && needs.build.result == 'success' && github.event.inputs.publish == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: 下载所有架构的 fpk 文件
        uses: actions/download-artifact@v7
        with:
          path: fpk_files
          merge-multiple: true

      - name: 生成当前日期 tag（格式 年.月.日）
        id: date_tag
        run: |
          TAG=$(date +'%Y.%-m.%-d')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_TITLE=【$TAG 更新】" >> $GITHUB_OUTPUT

      - name: 使用 GitHub CLI 发布到 shuangji66/Fndepot
        env:
          GH_TOKEN: ${{ secrets.BUILDBOT }}
        run: |
          REPO="shuangji66/Fndepot"
          TAG="${{ steps.date_tag.outputs.tag }}"
          TITLE="${{ steps.date_tag.outputs.RELEASE_TITLE }}"
          MANIFEST_VERSION="${{ needs.build.outputs.manifest_version }}"
          UPSTREAM_VERSION="${{ needs.build.outputs.upstream_version }}"
          CHANGELOG="${{ needs.build.outputs.changelog }}"

          NEW_NOTE="构建 ${{ needs.build.outputs.app_name }} 版本 ${MANIFEST_VERSION}（基于上游 v${UPSTREAM_VERSION}）。更新日志：${CHANGELOG}"

          if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            echo "Release $TAG 已存在，将添加资产并追加描述"
            CURRENT_BODY=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
            if [ -n "$CURRENT_BODY" ]; then
              NEW_BODY="${CURRENT_BODY}"$'\n'"$NEW_NOTE"
            else
              NEW_BODY="$NEW_NOTE"
            fi
            gh release edit "$TAG" --repo "$REPO" --notes "$NEW_BODY"
          else
            gh release create "$TAG" --repo "$REPO" --title "$TITLE" --notes "$NEW_NOTE"
          fi

          for fpk in fpk_files/*.fpk; do
            echo "上传 $fpk"
            gh release upload "$TAG" "$fpk" --repo "$REPO" --clobber
          done

      - name: 更新 fnpack.json 中的 Transmission 条目
        env:
          GH_TOKEN: ${{ secrets.BUILDBOT }}
        run: |
          REPO="shuangji66/Fndepot"
          TAG="${{ steps.date_tag.outputs.tag }}"
          APP_NAME="${{ needs.build.outputs.app_name }}"
          MANIFEST_VERSION="${{ needs.build.outputs.manifest_version }}"
          CHANGELOG="${{ needs.build.outputs.changelog }}"

          DOWNLOAD_URL_X86="https://github.com/${REPO}/releases/download/${TAG}/${APP_NAME}-${MANIFEST_VERSION}-x86.fpk"
          DOWNLOAD_URL_ARM="https://github.com/${REPO}/releases/download/${TAG}/${APP_NAME}-${MANIFEST_VERSION}-arm.fpk"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" fndepot_repo
          cd fndepot_repo

          jq --arg app "$APP_NAME" \
             --arg version "$MANIFEST_VERSION" \
             --arg changelog "$CHANGELOG" \
             --arg url_x86 "$DOWNLOAD_URL_X86" \
             --arg url_arm "$DOWNLOAD_URL_ARM" \
             '.[$app].version = $version |
              .[$app].changelog = $changelog |
              .[$app].arch_diff.x86.download_url = $url_x86 |
              .[$app].arch_diff.arm.download_url = $url_arm' \
             fnpack.json > fnpack.json.tmp
          mv fnpack.json.tmp fnpack.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fnpack.json
          git commit -m "chore: update ${APP_NAME} to ${MANIFEST_VERSION} (${TAG})"
          git push
