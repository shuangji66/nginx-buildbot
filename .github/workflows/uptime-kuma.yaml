name: Build Uptime Kuma from Release

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    outputs:
      version_clean: ${{ steps.set_version.outputs.version_clean }}
    steps:
      - name: 获取最新 Release 信息（含版本号）
        id: get_release
        run: |
          API_URL="https://api.github.com/repos/louislam/uptime-kuma/releases/latest"
          RESPONSE=$(curl -s $API_URL)
          TARBALL_URL=$(echo "$RESPONSE" | jq -r .tarball_url)
          VERSION=$(echo "$RESPONSE" | jq -r .tag_name)
          if [ -z "$TARBALL_URL" ] || [ "$TARBALL_URL" = "null" ]; then
            echo "错误：无法获取最新 release 的 tarball URL"
            exit 1
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "警告：未获取到版本号，使用默认值 unknown"
            VERSION="unknown"
          fi
          echo "tarball_url=$TARBALL_URL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "下载地址: $TARBALL_URL"
          echo "版本号: $VERSION"

      - name: 设置清理后的版本号
        id: set_version
        run: |
          VERSION="${{ steps.get_release.outputs.version }}"
          VERSION_CLEAN=${VERSION#v}
          echo "version_clean=$VERSION_CLEAN" >> $GITHUB_OUTPUT

      - name: 下载并解压源码包
        run: |
          curl -L "${{ steps.get_release.outputs.tarball_url }}" -o source.tar.gz
          mkdir uptime-kuma
          tar -xzf source.tar.gz --strip-components=1 -C uptime-kuma
          rm source.tar.gz
          ls -la uptime-kuma

      - name: 安装 Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: uptime-kuma/package-lock.json

      - name: 执行构建 (npm ci --omit dev --no-audit && npm run download-dist)
        run: |
          cd uptime-kuma
          npm ci --omit dev --no-audit
          npm run download-dist

      - name: 提取指定文件和目录
        id: extract
        run: |
          mkdir artifact_content
          cd uptime-kuma
          for dir in config db dist extra node_modules public server src; do
            if [ -e "$dir" ]; then
              cp -r "$dir" ../artifact_content/
            else
              echo "警告: 目录 $dir 不存在，跳过"
            fi
          done
          for file in ecosystem.config.js package-lock.json package.json tsconfig-backend.json tsconfig.json; do
            if [ -f "$file" ]; then
              cp "$file" ../artifact_content/
            else
              echo "警告: 文件 $file 不存在，跳过"
            fi
          done
          cd ..
          echo "提取完成，artifact_content 内容："
          ls -la artifact_content/

      - name: 检出本仓库 (shuangji66/buildbot)
        uses: actions/checkout@v4
        with:
          path: buildbot_repo

      - name: 准备 fnpack 打包工作区
        run: |
          mkdir -p build_workspace
          cp -r buildbot_repo/fnpack/uptime-kuma build_workspace/
          if [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
            FNPACK_BIN="fnpack-1.2.1-linux-amd64"
            PLATFORM="x86"
          else
            FNPACK_BIN="fnpack-1.2.1-linux-arm64"
            PLATFORM="arm"
          fi
          cp "buildbot_repo/fnpack/$FNPACK_BIN" build_workspace/fnpack
          chmod +x build_workspace/fnpack
          echo "PLATFORM=$PLATFORM" >> $GITHUB_ENV

      - name: 将构建产物复制到 uptime-kuma/app/server
        run: |
          mkdir -p build_workspace/uptime-kuma/app/server
          cp -r artifact_content/* build_workspace/uptime-kuma/app/server/

      - name: 修改 manifest 文件（替换版本号和平台）
        run: |
          MANIFEST_PATH="build_workspace/uptime-kuma/manifest"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "错误：manifest 文件不存在于 $MANIFEST_PATH"
            exit 1
          fi
          VERSION_CLEAN="${{ steps.set_version.outputs.version_clean }}"
          sed -i "s/\${VERSION}/$VERSION_CLEAN/g" "$MANIFEST_PATH"
          sed -i "s/\${PLATFORM}/${{ env.PLATFORM }}/g" "$MANIFEST_PATH"
          echo "manifest 修改后的内容："
          cat "$MANIFEST_PATH"

      - name: 执行 fnpack 打包
        run: |
          cd build_workspace
          ./fnpack build uptime-kuma
          FPK_FILE=$(ls *.fpk | head -n 1)
          if [ -z "$FPK_FILE" ]; then
            echo "错误：未找到生成的 fpk 文件"
            exit 1
          fi
          VERSION_CLEAN="${{ steps.set_version.outputs.version_clean }}"
          FINAL_NAME="uptime-kuma-${VERSION_CLEAN}-${{ env.PLATFORM }}.fpk"
          mv "$FPK_FILE" "$FINAL_NAME"
          echo "FINAL_FPK=$FINAL_NAME" >> $GITHUB_ENV
          echo "打包完成，生成文件：$FINAL_NAME"
          ls -la *.fpk

      - name: 上传 fpk 文件作为 Artifact（供发布任务使用）
        uses: actions/upload-artifact@v4
        with:
          name: fpk-${{ matrix.os }}
          path: build_workspace/${{ env.FINAL_FPK }}
          if-no-files-found: error

      # 可选：保留中间产物（提取的目录和文件）
      - name: 上传中间构建产物（仅指定文件和目录）
        uses: actions/upload-artifact@v4
        with:
          name: uptime-kuma-build-${{ steps.set_version.outputs.version_clean }}-${{ matrix.os }}
          path: artifact_content/
          if-no-files-found: error

  publish:
    name: 发布到 Fndepot Release
    runs-on: ubuntu-24.04
    needs: build
    if: always() && needs.build.result == 'success'
    steps:
      - name: 下载所有架构的 fpk 文件
        uses: actions/download-artifact@v4
        with:
          pattern: fpk-*
          path: fpk_files
          merge-multiple: true

      - name: 获取版本号（从任意一个文件名中提取）
        id: get_version
        run: |
          # 查找第一个 .fpk 文件
          FPK_FILE=$(find fpk_files -name "*.fpk" | head -n 1)
          if [ -z "$FPK_FILE" ]; then
            echo "错误：未找到任何 fpk 文件"
            exit 1
          fi
          # 提取版本号：文件名格式 uptime-kuma-<version>-<arch>.fpk
          BASENAME=$(basename "$FPK_FILE")
          VERSION=$(echo "$BASENAME" | sed -E 's/^uptime-kuma-(.+)-[^-]+\.fpk$/\1/')
          echo "version_clean=$VERSION" >> $GITHUB_OUTPUT
          echo "版本号: $VERSION"

      - name: 生成当前日期 tag（格式 年.月.日）
        id: date_tag
        run: |
          TAG=$(date +'%Y.%-m.%-d')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_TITLE=【$TAG 更新】" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: 使用 GitHub CLI 发布到 shuangji66/Fndepot
        env:
          GH_TOKEN: ${{ secrets.BUILDBOT }}
        run: |
          REPO="shuangji66/Fndepot"
          TAG="${{ steps.date_tag.outputs.tag }}"
          TITLE="${{ steps.date_tag.outputs.RELEASE_TITLE }}"

          # 检查 Release 是否已存在
          if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            echo "Release $TAG 已存在，将添加资产并更新描述"
            # 获取当前描述
            CURRENT_BODY=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
            # 生成新描述：将本次打包物名称追加到描述中（换行分隔）
            NEW_BODY="${CURRENT_BODY}\n本次添加: ${{ steps.get_version.outputs.version_clean }} 版本打包物"
            # 更新 Release 描述
            gh release edit "$TAG" --repo "$REPO" --body "$NEW_BODY"
          else
            echo "Release $TAG 不存在，将创建新 Release"
            INITIAL_BODY="本次添加: ${{ steps.get_version.outputs.version_clean }} 版本打包物"
            gh release create "$TAG" --repo "$REPO" --title "$TITLE" --notes "$INITIAL_BODY"
          fi

          # 上传所有 fpk 文件到该 Release
          for fpk in fpk_files/*.fpk; do
            echo "上传 $fpk"
            gh release upload "$TAG" "$fpk" --repo "$REPO" --clobber
          done
