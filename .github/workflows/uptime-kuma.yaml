name: Build Uptime Kuma and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Uptime Kuma 源码版本号（例如 2.2.1，不带 v）'
        required: true
        type: string
      manifest_version:
        description: 'manifest 中的版本号（例如 2.2.1，可不同于源码版本）'
        required: true
        type: string
      changelog:
        description: 'manifest 中的更新日志（支持中文）'
        required: true
        type: string

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    outputs:
      manifest_version: ${{ steps.set_vars.outputs.manifest_version }}
    steps:
      - name: 设置变量（源码版本、manifest版本、changelog）
        id: set_vars
        run: |
          VERSION_SOURCE="${{ github.event.inputs.version }}"
          MANIFEST_VERSION="${{ github.event.inputs.manifest_version }}"
          CHANGELOG="${{ github.event.inputs.changelog }}"
          if [ -z "$VERSION_SOURCE" ] || [ -z "$MANIFEST_VERSION" ]; then
            echo "错误：版本号不能为空"
            exit 1
          fi
          echo "version_source=$VERSION_SOURCE" >> $GITHUB_OUTPUT
          echo "manifest_version=$MANIFEST_VERSION" >> $GITHUB_OUTPUT
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT
          echo "源码版本: $VERSION_SOURCE"
          echo "manifest版本: $MANIFEST_VERSION"
          echo "更新日志: $CHANGELOG"

      - name: 下载并解压源码包（使用指定的源码版本号）
        run: |
          VERSION_SOURCE="${{ steps.set_vars.outputs.version_source }}"
          DOWNLOAD_URL="https://github.com/louislam/uptime-kuma/archive/refs/tags/${VERSION_SOURCE}.tar.gz"
          echo "下载地址: $DOWNLOAD_URL"
          curl -L "$DOWNLOAD_URL" -o source.tar.gz
          mkdir uptime-kuma
          tar -xzf source.tar.gz --strip-components=1 -C uptime-kuma
          rm source.tar.gz
          ls -la uptime-kuma

      - name: 安装 Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: uptime-kuma/package-lock.json

      - name: 执行构建 (npm ci --omit dev --no-audit && npm run download-dist)
        run: |
          cd uptime-kuma
          npm ci --omit dev --no-audit
          npm run download-dist

      - name: 提取指定文件和目录
        run: |
          mkdir artifact_content
          cd uptime-kuma
          for dir in config db dist extra node_modules public server src; do
            if [ -e "$dir" ]; then
              cp -r "$dir" ../artifact_content/
            else
              echo "警告: 目录 $dir 不存在，跳过"
            fi
          done
          for file in ecosystem.config.js package-lock.json package.json tsconfig-backend.json tsconfig.json; do
            if [ -f "$file" ]; then
              cp "$file" ../artifact_content/
            else
              echo "警告: 文件 $file 不存在，跳过"
            fi
          done
          cd ..
          echo "提取完成，artifact_content 内容："
          ls -la artifact_content/

      - name: 检出本仓库 (shuangji66/buildbot)
        uses: actions/checkout@v4
        with:
          path: buildbot_repo

      - name: 准备 fnpack 打包工作区
        run: |
          mkdir -p build_workspace
          cp -r buildbot_repo/fnpack/uptime-kuma build_workspace/
          if [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
            FNPACK_BIN="fnpack-1.2.1-linux-amd64"
            PLATFORM="x86"
          else
            FNPACK_BIN="fnpack-1.2.1-linux-arm64"
            PLATFORM="arm"
          fi
          cp "buildbot_repo/fnpack/$FNPACK_BIN" build_workspace/fnpack
          chmod +x build_workspace/fnpack
          echo "PLATFORM=$PLATFORM" >> $GITHUB_ENV

      - name: 将构建产物复制到 uptime-kuma/app/server
        run: |
          mkdir -p build_workspace/uptime-kuma/app/server
          cp -r artifact_content/* build_workspace/uptime-kuma/app/server/
          # 删除 node_modules 下所有层级的 .bin 目录
          find build_workspace/uptime-kuma/app/server/node_modules -type d -name ".bin" -exec rm -rf {} + 2>/dev/null || true

      - name: 修改 manifest 文件（替换版本号和更新日志）
        run: |
          MANIFEST_PATH="build_workspace/uptime-kuma/manifest"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "错误：manifest 文件不存在于 $MANIFEST_PATH"
            exit 1
          fi
          MANIFEST_VERSION="${{ steps.set_vars.outputs.manifest_version }}"
          CHANGELOG="${{ steps.set_vars.outputs.changelog }}"
          # 对 changelog 进行转义，防止 sed 出错（转义 &, /, 换行等）
          ESCAPED_CHANGELOG=$(printf '%s\n' "$CHANGELOG" | sed 's/[&/\]/\\&/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          sed -i "s/\${VERSION}/$MANIFEST_VERSION/g" "$MANIFEST_PATH"
          sed -i "s/\${CHANGELOG}/$ESCAPED_CHANGELOG/g" "$MANIFEST_PATH"
          sed -i "s/\${PLATFORM}/${{ env.PLATFORM }}/g" "$MANIFEST_PATH"
          echo "manifest 修改后的内容："
          cat "$MANIFEST_PATH"

      - name: 执行 fnpack 打包
        run: |
          cd build_workspace
          ./fnpack build uptime-kuma
          FPK_FILE=$(ls *.fpk | head -n 1)
          if [ -z "$FPK_FILE" ]; then
            echo "错误：未找到生成的 fpk 文件"
            exit 1
          fi
          # fpk 文件名使用 manifest 版本号
          FINAL_NAME="uptime-kuma-${{ steps.set_vars.outputs.manifest_version }}-${{ env.PLATFORM }}.fpk"
          mv "$FPK_FILE" "$FINAL_NAME"
          echo "FINAL_FPK=$FINAL_NAME" >> $GITHUB_ENV
          echo "打包完成，生成文件：$FINAL_NAME"
          ls -la *.fpk

      - name: 上传 fpk 文件作为 Artifact（供发布任务使用）
        uses: actions/upload-artifact@v4
        with:
          name: fpk-${{ matrix.os }}
          path: build_workspace/*.fpk
          if-no-files-found: error

  publish:
    name: 发布到 Fndepot Release
    runs-on: ubuntu-24.04
    needs: build
    if: always() && needs.build.result == 'success'
    steps:
      - name: 下载所有架构的 fpk 文件
        uses: actions/download-artifact@v4
        with:
          pattern: fpk-*
          path: fpk_files
          merge-multiple: true

      - name: 生成当前日期 tag（格式 年.月.日）
        id: date_tag
        run: |
          TAG=$(date +'%Y.%-m.%-d')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_TITLE=【$TAG 更新】" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: 使用 GitHub CLI 发布到 shuangji66/Fndepot
        env:
          GH_TOKEN: ${{ secrets.BUILDBOT }}
        run: |
          REPO="shuangji66/Fndepot"
          TAG="${{ steps.date_tag.outputs.tag }}"
          TITLE="${{ steps.date_tag.outputs.RELEASE_TITLE }}"
          NEW_NOTE="action构建更新uptime-kuma"

          if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            echo "Release $TAG 已存在，将添加资产并追加描述"
            CURRENT_BODY=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
            if [ -n "$CURRENT_BODY" ]; then
              NEW_BODY="${CURRENT_BODY}"$'\n'"$NEW_NOTE"
            else
              NEW_BODY="$NEW_NOTE"
            fi
            gh release edit "$TAG" --repo "$REPO" --notes "$NEW_BODY"
          else
            echo "Release $TAG 不存在，将创建新 Release"
            gh release create "$TAG" --repo "$REPO" --title "$TITLE" --notes "$NEW_NOTE"
          fi

          for fpk in fpk_files/*.fpk; do
            echo "上传 $fpk"
            gh release upload "$TAG" "$fpk" --repo "$REPO" --clobber
          done
