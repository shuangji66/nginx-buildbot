name: Build Uptime Kuma
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: 获取最新 Release 信息（含版本号）
        id: get_release
        run: |
          API_URL="https://api.github.com/repos/louislam/uptime-kuma/releases/latest"
          RESPONSE=$(curl -s $API_URL)
          TARBALL_URL=$(echo "$RESPONSE" | jq -r .tarball_url)
          VERSION=$(echo "$RESPONSE" | jq -r .tag_name)
          if [ -z "$TARBALL_URL" ] || [ "$TARBALL_URL" = "null" ]; then
            echo "错误：无法获取最新 release 的 tarball URL"
            exit 1
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            VERSION="unknown"
          fi
          echo "tarball_url=$TARBALL_URL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "下载地址: $TARBALL_URL"
          echo "版本号: $VERSION"

      - name: 创建目标目录（使用 sudo）
        run: |
          sudo mkdir -p /var/apps/uptime-kuma/target
          sudo chown -R $USER:$USER /var/apps/uptime-kuma

      - name: 下载并解压源码包到 /var/apps/uptime-kuma/target/server
        run: |
          curl -L "${{ steps.get_release.outputs.tarball_url }}" -o source.tar.gz
          mkdir -p /var/apps/uptime-kuma/target/server
          tar -xzf source.tar.gz --strip-components=1 -C /var/apps/uptime-kuma/target/server
          rm source.tar.gz
          ls -la /var/apps/uptime-kuma/target/server

      - name: 安装 Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: /var/apps/uptime-kuma/target/server/package-lock.json

      - name: 执行构建（生产依赖 + download-dist）
        run: |
          cd /var/apps/uptime-kuma/target/server
          npm ci --omit dev --no-audit
          npm run download-dist

      - name: 上传指定的构建产物
        uses: actions/upload-artifact@v4
        with:
          name: uptime-kuma-${{ steps.get_release.outputs.version }}-${{ matrix.os }}
          path: |
            config
            db
            dist
            extra
            node_modules
            public
            server
            src
            ecosystem.config.js
            package-lock.json
            package.json
            tsconfig-backend.json
            tsconfig.json
          working-directory: /var/apps/uptime-kuma/target/server
          if-no-files-found: error
