name: Build Uptime Kuma
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: 获取最新 Release 信息（含版本号）
        id: get_release
        run: |
          API_URL="https://api.github.com/repos/louislam/uptime-kuma/releases/latest"
          RESPONSE=$(curl -s $API_URL)
          TARBALL_URL=$(echo "$RESPONSE" | jq -r .tarball_url)
          VERSION=$(echo "$RESPONSE" | jq -r .tag_name)
          if [ -z "$TARBALL_URL" ] || [ "$TARBALL_URL" = "null" ]; then
            echo "错误：无法获取最新 release 的 tarball URL"
            exit 1
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "警告：未获取到版本号，使用默认值 unknown"
            VERSION="unknown"
          fi
          echo "tarball_url=$TARBALL_URL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "下载地址: $TARBALL_URL"
          echo "版本号: $VERSION"

      - name: 下载并解压源码包
        run: |
          curl -L "${{ steps.get_release.outputs.tarball_url }}" -o source.tar.gz
          mkdir uptime-kuma
          tar -xzf source.tar.gz --strip-components=1 -C uptime-kuma
          rm source.tar.gz
          ls -la uptime-kuma

      - name: 安装 Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: uptime-kuma/package-lock.json

      - name: 执行构建 (npm ci --omit dev --no-audit && npm run download-dist)
        run: |
          cd uptime-kuma
          npm ci --omit dev --no-audit
          npm run download-dist

      - name: 提取指定文件和目录
        run: |
          mkdir artifact_content
          cd uptime-kuma
          # 复制指定的目录
          for dir in config db dist extra node_modules public server src; do
            if [ -e "$dir" ]; then
              cp -r "$dir" ../artifact_content/
            else
              echo "警告: 目录 $dir 不存在，跳过"
            fi
          done
          # 复制指定的文件
          for file in ecosystem.config.js package-lock.json package.json tsconfig-backend.json tsconfig.json; do
            if [ -f "$file" ]; then
              cp "$file" ../artifact_content/
            else
              echo "警告: 文件 $file 不存在，跳过"
            fi
          done
          cd ..
          echo "提取完成，artifact_content 内容："
          ls -la artifact_content/

      - name: 上传构建产物（仅指定文件和目录）
        uses: actions/upload-artifact@v4
        with:
          name: uptime-kuma-${{ steps.get_release.outputs.version }}-${{ matrix.os }}
          path: artifact_content/
          if-no-files-found: error
