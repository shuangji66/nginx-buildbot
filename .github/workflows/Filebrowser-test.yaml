name: Build Filebrowser and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '上游软件版本号（不带 v，例如 2.63.1）'
        required: true
        type: string
      manifest_version:
        description: 'manifest 中的版本号'
        required: true
        type: string
      changelog:
        description: '更新日志（支持中文）'
        required: true
        type: string

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    outputs:
      app_name: ${{ steps.set_vars.outputs.app_name }}
      manifest_version: ${{ steps.set_vars.outputs.manifest_version }}
      upstream_version: ${{ steps.set_vars.outputs.upstream_version }}
      changelog: ${{ steps.set_vars.outputs.changelog }}
    steps:
      - name: 设置项目变量
        id: set_vars
        run: |
          # ========== 项目特定配置（迁移时只需修改此处） ==========
          APP_NAME="Filebrowser"
          BINARY_NAME="filebrowser"
          DOWNLOAD_URL_TEMPLATE="https://github.com/filebrowser/filebrowser/releases/download/v{version}/linux-{arch}-filebrowser.tar.gz"
          # ======================================================
          VERSION="${{ github.event.inputs.version }}"
          MANIFEST_VERSION="${{ github.event.inputs.manifest_version }}"
          CHANGELOG="${{ github.event.inputs.changelog }}"
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "upstream_version=$VERSION" >> $GITHUB_OUTPUT
          echo "manifest_version=$MANIFEST_VERSION" >> $GITHUB_OUTPUT
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT
          echo "binary_name=$BINARY_NAME" >> $GITHUB_OUTPUT
          echo "download_url_template=$DOWNLOAD_URL_TEMPLATE" >> $GITHUB_OUTPUT

      - name: 确定架构和平台标识
        id: arch
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
            ARCH="amd64"
            PLATFORM="x86"
          else
            ARCH="arm64"
            PLATFORM="arm"
          fi
          echo "arch=$ARCH" >> $GITHUB_OUTPUT
          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT

      - name: 下载二进制包
        run: |
          VERSION="${{ steps.set_vars.outputs.upstream_version }}"
          ARCH="${{ steps.arch.outputs.arch }}"
          URL_TEMPLATE="${{ steps.set_vars.outputs.download_url_template }}"
          URL="${URL_TEMPLATE//\{version\}/$VERSION}"
          URL="${URL//\{arch\}/$ARCH}"
          curl -L -o archive.tar.gz "$URL"
          tar -xzf archive.tar.gz
          BINARY="${{ steps.set_vars.outputs.binary_name }}"
          chmod +x "$BINARY"

      - name: 准备 fnpack 工具和模板
        run: |
          mkdir -p build_workspace
          cp -r "fnpack/${{ steps.set_vars.outputs.app_name }}" build_workspace/
          if [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
            FNPACK_BIN="fnpack-1.2.1-linux-amd64"
          else
            FNPACK_BIN="fnpack-1.2.1-linux-arm64"
          fi
          cp "fnpack/$FNPACK_BIN" build_workspace/fnpack
          chmod +x build_workspace/fnpack

      # ========== 项目特有的复制步骤 ==========
      - name: 将二进制复制到 app/server 目录
        run: |
          APP_DIR="build_workspace/${{ steps.set_vars.outputs.app_name }}/app"
          mkdir -p "$APP_DIR/server"
          cp "${{ steps.set_vars.outputs.binary_name }}" "$APP_DIR/server/"
      # =====================================

      - name: 调用通用 fnpack 打包与上传
        uses: ./.github/actions/fnpack-pack
        with:
          app_name: ${{ steps.set_vars.outputs.app_name }}
          manifest_version: ${{ steps.set_vars.outputs.manifest_version }}
          changelog: ${{ steps.set_vars.outputs.changelog }}
          platform: ${{ steps.arch.outputs.platform }}

  publish:
    name: 发布到 Fndepot Release
    needs: build
    if: always() && needs.build.result == 'success'
    uses: ./.github/workflows/publish.yaml
    with:
      app_name: ${{ needs.build.outputs.app_name }}
      manifest_version: ${{ needs.build.outputs.manifest_version }}
      upstream_version: ${{ needs.build.outputs.upstream_version }}
      changelog: ${{ needs.build.outputs.changelog }}
    secrets:
      BUILDBOT: ${{ secrets.BUILDBOT }}
