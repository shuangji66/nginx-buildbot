name: Build Tvheadend

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          #- arch: arm64
          #  runner: ubuntu-22.04-arm

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git cmake pkg-config gettext \
            libssl-dev libdvbcsa-dev libavahi-client-dev libsqlite3-dev \
            libusb-1.0-0-dev zlib1g-dev wget python3 python3-pip \
            libxml2-dev libva-dev libvdpau-dev libdrm-dev libasound2-dev libpulse-dev \
            autotools-dev
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Build Tvheadend
        run: |
          # 使用当前工作空间作为工作目录
          WORKDIR="${{ github.workspace }}/tvheadend"
          git clone https://github.com/tvheadend/tvheadend.git "$WORKDIR"
          cd "$WORKDIR"
          
          ./configure --prefix=/var/apps/Tvheadend/target
          make -j$(nproc)
          
          # 确认二进制文件已生成
          ls -l build.linux/tvheadend

      - name: Package artifact
        run: |
          WORKDIR="${{ github.workspace }}/tvheadend"
          mkdir -p artifact
          cp "$WORKDIR/build.linux/tvheadend" artifact/
          tar -czf tvheadend-${{ matrix.arch }}.tar.gz -C artifact tvheadend

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tvheadend-${{ matrix.arch }}
          path: tvheadend-${{ matrix.arch }}.tar.gz
