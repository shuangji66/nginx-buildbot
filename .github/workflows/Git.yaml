name: Build Git and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Git 上游版本号（例如 2.53.0）'
        required: true
        type: string
      manifest_version:
        description: 'manifest 中的版本号'
        required: true
        type: string
      changelog:
        description: '更新日志（支持中文）'
        required: true
        type: string

jobs:
  build:
    strategy:
      matrix:
        arch: [x64, arm64]
    runs-on: ${{ matrix.arch == 'x64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    container: debian:bookworm
    outputs:
      app_name: ${{ steps.set_vars.outputs.app_name }}
      manifest_version: ${{ steps.set_vars.outputs.manifest_version }}
      upstream_version: ${{ steps.set_vars.outputs.upstream_version }}
      changelog: ${{ steps.set_vars.outputs.changelog }}
    steps:
      - name: 设置项目变量
        id: set_vars
        run: |
          APP_NAME="Git"
          VERSION="${{ github.event.inputs.version }}"
          MANIFEST_VERSION="${{ github.event.inputs.manifest_version }}"
          CHANGELOG="${{ github.event.inputs.changelog }}"
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "upstream_version=$VERSION" >> $GITHUB_OUTPUT
          echo "manifest_version=$MANIFEST_VERSION" >> $GITHUB_OUTPUT
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: 确定架构和平台标识（用于 fnpack）
        id: arch
        run: |
          if [ "${{ matrix.arch }}" = "x64" ]; then
            PLATFORM="x86"
            LFS_ARCH="amd64"
          else
            PLATFORM="arm"
            LFS_ARCH="arm64"
          fi
          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT
          echo "lfs_arch=$LFS_ARCH" >> $GITHUB_OUTPUT

      - name: 安装编译依赖
        run: |
          apt-get update
          apt-get install -y \
            build-essential libcurl4-gnutls-dev libssl-dev libexpat1-dev gettext wget zlib1g-dev tar

      - name: 下载并解压 Git 源码
        run: |
          VERSION="${{ steps.set_vars.outputs.upstream_version }}"
          wget "https://www.kernel.org/pub/software/scm/git/git-${VERSION}.tar.gz"
          tar -xzf "git-${VERSION}.tar.gz"
          mv "git-${VERSION}" git-src

      - name: 配置、编译、安装到 /var/apps/Git/target
        working-directory: ./git-src
        run: |
          ./configure --prefix=/var/apps/Git/target
          make -j$(nproc)
          make strip install

      # ========== 新增：下载并集成 git-lfs ==========
      - name: 下载并安装 git-lfs
        run: |
          LFS_VERSION="3.7.1"
          LFS_ARCH="${{ steps.arch.outputs.lfs_arch }}"
          LFS_URL="https://github.com/git-lfs/git-lfs/releases/download/v${LFS_VERSION}/git-lfs-linux-${LFS_ARCH}-v${LFS_VERSION}.tar.gz"
          wget "$LFS_URL" -O git-lfs.tar.gz
          tar -xzf git-lfs.tar.gz
          # 解压后目录结构：git-lfs-{version}/git-lfs
          find . -name "git-lfs" -type f -executable | head -1 | xargs -I {} cp {} /var/apps/Git/target/bin/
          chmod +x /var/apps/Git/target/bin/git-lfs
          echo "git-lfs 已安装到 /var/apps/Git/target/bin"
          ls -la /var/apps/Git/target/bin/
      # ============================================

      - name: 检出 buildbot 仓库（容器内先安装 git）
        run: |
          apt-get install -y git

      - name: 检出 buildbot 仓库
        uses: actions/checkout@v6
        with:
          path: buildbot_repo

      - name: 准备 fnpack 工具和模板
        run: |
          mkdir -p build_workspace
          cp -r "buildbot_repo/fnpack/${{ steps.set_vars.outputs.app_name }}" build_workspace/
          if [ "${{ matrix.arch }}" = "x64" ]; then
            FNPACK_BIN="fnpack-1.2.1-linux-amd64"
          else
            FNPACK_BIN="fnpack-1.2.1-linux-arm64"
          fi
          cp "buildbot_repo/fnpack/$FNPACK_BIN" build_workspace/fnpack
          chmod +x build_workspace/fnpack

      # ========== 复制编译产物（包含 git-lfs）到 app 目录 ==========
      - name: 将编译好的 Git 及 git-lfs 复制到 app 目录
        run: |
          APP_DIR="build_workspace/${{ steps.set_vars.outputs.app_name }}/app"
          mkdir -p "$APP_DIR"
          cp -r /var/apps/Git/target/* "$APP_DIR/"
          echo "复制完成，app 目录内容："
          ls -la "$APP_DIR"
          ls -la "$APP_DIR/bin" || true
      # =========================================================

      - name: 修改 manifest 文件
        run: |
          MANIFEST_PATH="build_workspace/${{ steps.set_vars.outputs.app_name }}/manifest"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "错误：manifest 文件不存在于 $MANIFEST_PATH"
            exit 1
          fi
          apt-get install -y jq
          MANIFEST_VERSION="${{ steps.set_vars.outputs.manifest_version }}"
          CHANGELOG="${{ steps.set_vars.outputs.changelog }}"
          ESCAPED_CHANGELOG=$(printf '%s' "$CHANGELOG" | jq -sRr @json)
          sed -i "s/\${VERSION}/$MANIFEST_VERSION/g" "$MANIFEST_PATH"
          sed -i "s/\${CHANGELOG}/$ESCAPED_CHANGELOG/g" "$MANIFEST_PATH"
          sed -i "s/\${PLATFORM}/${{ steps.arch.outputs.platform }}/g" "$MANIFEST_PATH"
          echo "manifest 修改后的内容："
          cat "$MANIFEST_PATH"

      - name: 执行 fnpack 打包
        run: |
          cd build_workspace
          ./fnpack build "${{ steps.set_vars.outputs.app_name }}"
          FPK_FILE=$(ls *.fpk | head -n 1)
          if [ -z "$FPK_FILE" ]; then
            echo "错误：未找到生成的 fpk 文件"
            exit 1
          fi
          FINAL_NAME="${{ steps.set_vars.outputs.app_name }}-${{ steps.set_vars.outputs.manifest_version }}-${{ steps.arch.outputs.platform }}.fpk"
          mv "$FPK_FILE" "$FINAL_NAME"
          echo "FINAL_FPK=$FINAL_NAME" >> $GITHUB_ENV
          echo "打包完成，生成文件：$FINAL_NAME"
          ls -la *.fpk

      - name: 上传 fpk 文件作为 Artifact（供发布任务使用）
        uses: actions/upload-artifact@v7
        with:
          name: fpk-${{ steps.arch.outputs.platform }}
          path: build_workspace/*.fpk
          if-no-files-found: error

  publish:
    name: 发布到 Fndepot Release
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: 下载所有架构的 fpk 文件
        uses: actions/download-artifact@v7
        with:
          path: fpk_files
          merge-multiple: true

      - name: 生成当前日期 tag（格式 年.月.日）
        id: date_tag
        run: |
          TAG=$(date +'%Y.%-m.%-d')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_TITLE=【$TAG 更新】" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: 使用 GitHub CLI 发布到 shuangji66/Fndepot
        env:
          GH_TOKEN: ${{ secrets.BUILDBOT }}
        run: |
          REPO="shuangji66/Fndepot"
          TAG="${{ steps.date_tag.outputs.tag }}"
          TITLE="${{ steps.date_tag.outputs.RELEASE_TITLE }}"
          MANIFEST_VERSION="${{ needs.build.outputs.manifest_version }}"
          UPSTREAM_VERSION="${{ needs.build.outputs.upstream_version }}"
          CHANGELOG="${{ needs.build.outputs.changelog }}"

          if [ -n "$UPSTREAM_VERSION" ]; then
            NEW_NOTE="构建 ${{ needs.build.outputs.app_name }} 版本 ${MANIFEST_VERSION}（基于上游 v${UPSTREAM_VERSION}，集成 git-lfs 3.7.1）。更新日志：${CHANGELOG}"
          else
            NEW_NOTE="构建 ${{ needs.build.outputs.app_name }} 版本 ${MANIFEST_VERSION}。更新日志：${CHANGELOG}"
          fi

          if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            echo "Release $TAG 已存在，将添加资产并追加描述"
            CURRENT_BODY=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
            if [ -n "$CURRENT_BODY" ]; then
              NEW_BODY="${CURRENT_BODY}"$'\n'"$NEW_NOTE"
            else
              NEW_BODY="$NEW_NOTE"
            fi
            gh release edit "$TAG" --repo "$REPO" --notes "$NEW_BODY"
          else
            echo "Release $TAG 不存在，将创建新 Release"
            gh release create "$TAG" --repo "$REPO" --title "$TITLE" --notes "$NEW_NOTE"
          fi

          for fpk in fpk_files/*.fpk; do
            echo "上传 $fpk"
            gh release upload "$TAG" "$fpk" --repo "$REPO" --clobber
          done

      - name: 更新 fnpack.json 中的 Git 条目
        env:
          GH_TOKEN: ${{ secrets.BUILDBOT }}
        run: |
          REPO="shuangji66/Fndepot"
          TAG="${{ steps.date_tag.outputs.tag }}"
          APP_NAME="${{ needs.build.outputs.app_name }}"
          MANIFEST_VERSION="${{ needs.build.outputs.manifest_version }}"
          CHANGELOG="${{ needs.build.outputs.changelog }}"

          DOWNLOAD_URL_X86="https://github.com/${REPO}/releases/download/${TAG}/${APP_NAME}-${MANIFEST_VERSION}-x86.fpk"
          DOWNLOAD_URL_ARM="https://github.com/${REPO}/releases/download/${TAG}/${APP_NAME}-${MANIFEST_VERSION}-arm.fpk"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" fndepot_repo
          cd fndepot_repo

          jq --arg app "$APP_NAME" \
             --arg version "$MANIFEST_VERSION" \
             --arg changelog "$CHANGELOG" \
             --arg url_x86 "$DOWNLOAD_URL_X86" \
             --arg url_arm "$DOWNLOAD_URL_ARM" \
             '.[$app].version = $version |
              .[$app].changelog = $changelog |
              .[$app].arch_diff.x86.download_url = $url_x86 |
              .[$app].arch_diff.arm.download_url = $url_arm' \
             fnpack.json > fnpack.json.tmp
          mv fnpack.json.tmp fnpack.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fnpack.json
          git commit -m "chore: update ${APP_NAME} to ${MANIFEST_VERSION} (${TAG})"
          git push
