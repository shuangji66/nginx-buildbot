name: Publish to Fndepot Release

on:
  workflow_call:
    inputs:
      app_name:
        description: '应用名称（如 Filebrowser, CloudSaver）'
        required: true
        type: string
      manifest_version:
        description: 'manifest 中的版本号（用于 fpk 包）'
        required: true
        type: string
      upstream_version:
        description: '上游软件版本（可选，用于描述）'
        required: false
        type: string
        default: ''
      changelog:
        description: '更新日志（支持中文）'
        required: true
        type: string
      artifact_pattern:
        description: '待上传的 fpk 文件所在的 artifact 名称模式'
        required: false
        type: string
        default: 'fpk-*'
    secrets:
      BUILDBOT:
        description: 'GitHub Token，用于发布到 shuangji66/Fndepot'
        required: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: 下载所有架构的 fpk 文件
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.artifact_pattern }}
          path: fpk_files
          merge-multiple: true

      - name: 生成当前日期 tag（格式 年.月.日）
        id: date_tag
        run: |
          TAG=$(date +'%Y.%-m.%-d')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_TITLE=【$TAG 更新】" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: 使用 GitHub CLI 发布到 shuangji66/Fndepot
        env:
          GH_TOKEN: ${{ secrets.BUILDBOT }}
        run: |
          REPO="shuangji66/Fndepot"
          TAG="${{ steps.date_tag.outputs.tag }}"
          TITLE="${{ steps.date_tag.outputs.RELEASE_TITLE }}"
          MANIFEST_VERSION="${{ inputs.manifest_version }}"
          UPSTREAM_VERSION="${{ inputs.upstream_version }}"
          CHANGELOG="${{ inputs.changelog }}"

          if [ -n "$UPSTREAM_VERSION" ]; then
            NEW_NOTE="构建 ${{ inputs.app_name }} 版本 ${MANIFEST_VERSION}（基于上游 v${UPSTREAM_VERSION}）。更新日志：${CHANGELOG}"
          else
            NEW_NOTE="构建 ${{ inputs.app_name }} 版本 ${MANIFEST_VERSION}。更新日志：${CHANGELOG}"
          fi

          if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            echo "Release $TAG 已存在，将添加资产并追加描述"
            CURRENT_BODY=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
            if [ -n "$CURRENT_BODY" ]; then
              NEW_BODY="${CURRENT_BODY}"$'\n'"$NEW_NOTE"
            else
              NEW_BODY="$NEW_NOTE"
            fi
            gh release edit "$TAG" --repo "$REPO" --notes "$NEW_BODY"
          else
            echo "Release $TAG 不存在，将创建新 Release"
            gh release create "$TAG" --repo "$REPO" --title "$TITLE" --notes "$NEW_NOTE"
          fi

          for fpk in fpk_files/*.fpk; do
            echo "上传 $fpk"
            gh release upload "$TAG" "$fpk" --repo "$REPO" --clobber
          done
