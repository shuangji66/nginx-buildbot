name: Build Transmission (musl static)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        # Alpine 容器原生支持 amd64 / arm64
        arch: [ubuntu-24.04, ubuntu-24.04-arm]
        # 注意：runner 名称仅用于调度，实际构建环境由 container 决定
    runs-on: ${{ matrix.arch }}
    container:
      image: alpine:latest
    steps:
      - name: Install build dependencies
        run: |
          apk update && apk add --no-cache \
            build-base \
            cmake \
            pkgconfig \
            linux-headers \
            openssl-static \
            openssl-dev \
            curl-static \
            curl-dev \
            libevent-static \
            libevent-dev \
            brotli-static \
            brotli-dev \
            nghttp2-static \
            nghttp2-dev \
            zlib-static \
            zlib-dev \
            gettext-dev \
            xz

      - name: Download source
        run: |
          wget https://github.com/transmission/transmission/releases/download/4.1.1/transmission-4.1.1.tar.xz
          tar xf transmission-4.1.1.tar.xz
          cd transmission-4.1.1

      - name: Configure CMake (musl static)
        working-directory: transmission-4.1.1
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_EXE_LINKER_FLAGS="-static" \
            -DCMAKE_C_FLAGS="-static" \
            -DCMAKE_CXX_FLAGS="-static" \
            -DENABLE_GTK=OFF \
            -DENABLE_QT=OFF \
            -DENABLE_MAC=OFF \
            -DENABLE_DAEMON=ON \
            -DENABLE_UTILS=ON \
            -DENABLE_CLI=ON \
            -DENABLE_NLS=OFF \
            -DWITH_CRYPTO=openssl \
            -DUSE_SYSTEM_EVENT2=OFF \
            -DUSE_SYSTEM_DEFLATE=OFF \
            -DUSE_SYSTEM_DHT=OFF \
            -DUSE_SYSTEM_MINIUPNPC=OFF \
            -DUSE_SYSTEM_NATPMP=OFF \
            -DUSE_SYSTEM_UTP=OFF \
            -DUSE_SYSTEM_B64=OFF \
            -DUSE_SYSTEM_PSL=OFF

      - name: Build
        working-directory: transmission-4.1.1
        run: cmake --build build --parallel $(nproc)

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: transmission-bin-${{ matrix.os }}
          path: |
            transmission-4.1.1/build/daemon/transmission-daemon
            transmission-4.1.1/build/utils/transmission*
